name: Deploy to GitHub Pages

on:
  # Run on every push to main
  push:
    branches: [main]
  # Weekly rebuild (Mondays 06:00 UTC) so the static /roles SEO snapshot
  # refreshes from the backend even without a push.
  schedule:
    - cron: '0 6 * * 1'
  # Allow manual runs from the Actions tab
  workflow_dispatch:

# Permissions the GITHUB_TOKEN needs to deploy to Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Only one Pages deployment at a time; don't cancel an in-progress one
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build site
        # PUBLIC_API_ENDPOINT drives the /roles list + detail build-time fetch
        # (and its client-side refresh) plus the apply forms. Without it set as
        # a repo Actions variable, these all fall back to their empty/offline
        # states and every production build silently ships with no roles.
        # Settings → Secrets and variables → Actions → Variables →
        # PUBLIC_API_ENDPOINT = https://ats-backend-snowy.vercel.app
        env:
          PUBLIC_API_ENDPOINT: ${{ vars.PUBLIC_API_ENDPOINT }}
          PUBLIC_LOG_ENDPOINT: ${{ vars.PUBLIC_LOG_ENDPOINT }}
        run: pnpm build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
